<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Your AI Mascot</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #4b0082;
            --accent: #00ffff;
            --text: #ffffff;
            --bg: #0f0c29;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg), #302b63, #24243e);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Glassmorphism Container */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 4rem;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: -webkit-linear-gradient(var(--accent), #e0aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .btn {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: #000;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 255, 255, 0.3);
        }

        /* The Interactive Web Mascot */
        .web-mascot {
            position: absolute;
            top: 15%;
            right: 20%;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #b28dff, var(--primary));
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            animation: float 4s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .eye {
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
        }

        .pupil {
            width: 12px;
            height: 12px;
            background: #000;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: 0.1s ease-out;
        }

        /* Decorative Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }
        .orb-1 { width: 300px; height: 300px; background: var(--primary); top: -100px; left: -100px; opacity: 0.5; }
        .orb-2 { width: 400px; height: 400px; background: var(--accent); bottom: -150px; right: -100px; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="web-mascot">
        <div class="eye"><div class="pupil"></div></div>
        <div class="eye"><div class="pupil"></div></div>
    </div>

    <div class="container">
        <h1>Bring Your Desktop to Life</h1>
        <p>Meet your new AI companion. Smart, customizable, and always there when you need a boost. Watch it interact with your workspace like never before.</p>
        <a href="#" class="btn">Download for Windows</a>
        <p style="font-size: 0.9rem; margin-top: 1rem; margin-bottom: 0;">Mac & Linux versions coming soon.</p>
    </div>

    <script>
        // JavaScript to make the mascot's eyes follow the cursor
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            const eyes = document.querySelectorAll('.eye');
            
            eyes.forEach(eye => {
                const rect = eye.getBoundingClientRect();
                const eyeCenterX = rect.left + rect.width / 2;
                const eyeCenterY = rect.top + rect.height / 2;

                const deltaX = mouseX - eyeCenterX;
                const deltaY = mouseY - eyeCenterY;
                
                const angle = Math.atan2(deltaY, deltaX);
                
                // Limit the pupil movement so it stays inside the eye
                const maxDistance = 8; 
                const pupilX = Math.cos(angle) * maxDistance;
                const pupilY = Math.sin(angle) * maxDistance;

                const pupil = eye.querySelector('.pupil');
                pupil.style.transform = `translate(calc(-50% + ${pupilX}px), calc(-50% + ${pupilY}px))`;
            });
        });
    </script>
</body>
</html>
